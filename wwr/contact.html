<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - White Water Rafting Adventures</title>
    <meta name="description" content="Get in touch with White Water Rafting Company. Contact us for booking information, trip inquiries, or operational requests.">
    <meta name="author" content="Oyinlola Ashade">
    <link rel="stylesheet" href="styles/styles.css">
</head>
<body>

    <header>
        <div class="logo-container">
            <img src="images/logo.png" alt="White Water Rafting Company Logo" class="logo">
        </div>
        <nav>
            <a href="index.html">Home</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html" class="active">Contact Us</a>
        </nav>
    </header>

    <main>
         <section class="form-container">
            <div class="form-header">
                <h2>Send a Message</h2>
                <p>Fill out the operational request form below. Your input will be processed securely:</p>
            </div>

            <form action="#" method="POST" class="contact-form">
                
                <div class="form-group">
                    <label for="full-name">Full Name / Company:</label>
                    <input type="text" id="full-name" name="user_name" required placeholder="e.g., Lualaba Mining Corp">
                </div>

                <div class="form-group">
                    <label for="email-address">Professional Email Address:</label>
                    <input type="email" id="email-address" name="user_email" required placeholder="kirongozinotes1@gmail.com">
                </div>

                <div class="form-group">
                    <label for="subject">Inquiry Subject:</label>
                    <select id="subject" name="inquiry_subject" required>
                        <option value="recruitment">Talent Acquisition / Recruitment</option>
                        <option value="booking">Trip Booking & Reservations</option>
                        <option value="general">General Operational Inquiry</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="message">Detailed Message:</label>
                    <textarea id="message" name="user_message" rows="5" required placeholder="Type your corporate specifications or interview proposal here..."></textarea>
                </div>

                <button type="submit" class="submit-btn-secure">Submit Secure Message 🚀</button>

            </form>
        </section>

        <section class="adventure-section">
            <h2>Adventure Awaits You!</h2>
            <div class="adventure-gallery">
                <figure>
                    <img src="images/calmrivers.jpg" alt="Rafters paddling down calm river waters between canyon walls">
                    <figcaption>Calm Rivers</figcaption>
                </figure>
                <figure>
                    <img src="images/adrenaline.jpg" alt="High adrenaline white water rafting team fighting splashing rapid waves">
                    <figcaption>Adrenaline</figcaption>
                </figure>
                <figure>
                    <img src="images/familydays.jpg" alt="Families smiling and enjoying a group rafting river excursion">
                    <figcaption>Family Days</figcaption>
                </figure>
                <figure>
                    <img src="images/beautifulviews.jpg" alt="Scenic green mountain view flanking a wide clear blue river canyon">
                    <figcaption>Beautiful Views</figcaption>
                </figure>
                <figure>
                    <img src="images/expertguides.png" alt="Our expert rafting guides holding oars and wearing helmets">
                    <figcaption>Expert Guides</figcaption>
                </figure>
            </div>
        </section>

    </main>

    <footer>
        <p>&copy; 2026 | White Water Rafting | Oyinlola Ashade | Oyinlola Milestone Store</p>
        <nav class="socialmedia">
            <a href="https://facebook.com" target="_blank"><img src="images/facebook.png" alt="Facebook logo link profile"></a>
            <a href="https://instagram.com" target="_blank"><img src="images/instagram.png" alt="Instagram logo link profile"></a>
            <a href="https://linkedin.com" target="_blank"><img src="images/linkedin.png" alt="LinkedIn logo link profile"></a>
        </nav>
    </footer>

</body>
</html>
