<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Water Rafting Company</title>
    <meta name="description" content="Get in touch with Water Rafting Company. Contact us for booking information, trip inquiries, and directions to our rafting sites.">
    <meta name="author" content="Oyinlola Oyedeji Ashade">
    <link rel="stylesheet" href="styles/rafting.css">
</head>
<body>

    <header>
        <img src="images/rafting-logo.png" alt="Rafting Company Logo">
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>

    <main>
        <h1>Contact Water Rafting Company</h1>

        <form action="#" method="POST">
            
            <div class="form-group">
                <label for="full-name">Full Name:</label>
                <input type="text" id="full-name" name="user_name" required>
            </div>

            <div class="form-group">
                <p>What is your preferred rafting challenge level?</p>
                <label for="lvl-easy">
                    <input type="radio" id="lvl-easy" name="trip_level" value="easy"> Calm Waters (Beginner)
                </label>
                <label for="lvl-med">
                    <input type="radio" id="lvl-med" name="trip_level" value="moderate"> Mid-Tier Rapids (Intermediate)
                </label>
                <label for="lvl-hard">
                    <input type="radio" id="lvl-hard" name="trip_level" value="hard"> High Adrenaline (Advanced)
                </label>
            </div>

            <div class="form-group">
                <label for="message">Your Message / Inquiries:</label>
                <textarea id="message" name="user_message" rows="5" required></textarea>
            </div>

            <div class="form-group">
                <label for="subscribe">
                    <input type="checkbox" id="subscribe" name="newsletter_subscribe" value="yes"> Subscribe to seasonal trip updates and discounts
                </label>
            </div>

            <button type="submit" class="submit-btn">Send Message</button>

        </form>

        <section class="adventure-section">
            <h2>Adventure Awaits You!</h2>
            <div class="adventure-gallery">
                <figure>
                    <img src="images/calmrivers.jpg" alt="Calm river rafting">
                    <figcaption>Calm Rivers</figcaption>
                </figure>
                <figure>
                    <img src="images/adrenaline.jpg" alt="High adrenaline white water rafting">
                    <figcaption>Adrenaline</figcaption>
                </figure>
                <figure>
                    <img src="images/familydays.jpg" alt="Families enjoying rafting">
                    <figcaption>Family Days</figcaption>
                </figure>
                <figure>
                    <img src="images/beautifulviews.jpg" alt="Scenic river mountain view">
                    <figcaption>Beautiful Views</figcaption>
                </figure>
                <figure>
                    <img src="images/expertguides.png" alt="Our expert rafting guides">
                    <figcaption>Expert Guides</figcaption>
                </figure>
            </div>
        </section>

    </main>

    <footer>
        <p>&copy; 2026 | Water Rafting Company | Oyinlola Oyedeji Ashade</p>

        <nav class="socialmedia">
            <a href="https://facebook.com" target="_blank">
                <img src="images/facebook.png" alt="Facebook icon">
            </a>
            <a href="https://instagram.com" target="_blank">
                <img src="images/instagram.png" alt="Instagram icon">
            </a>
            <a href="https://linkedin.com" target="_blank">
                <img src="images/linkedin.png" alt="LinkedIn icon">
            </a>
        </nav>
    </footer>

</body>
</html>
